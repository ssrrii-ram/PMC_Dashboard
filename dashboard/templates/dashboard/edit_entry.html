<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ label }} - PMC Dashboard</title>
    <style>
        :root {
            --bg: #f3f6fa;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --ink: #101828;
            --muted: #5f6b7a;
            --line: #d9e1ea;
            --navy: #0b2f5b;
            --green: #16833a;
            --red: #c5221f;
            --shadow: 0 18px 45px rgba(16, 24, 40, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background: var(--bg);
        }

        button, input, select, textarea { font: inherit; }

        button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 3px solid #84c5ff;
            outline-offset: 2px;
        }

        .page {
            width: min(800px, calc(100% - 28px));
            margin: 0 auto;
            padding: 36px 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            background: var(--navy);
            color: #fff;
            padding: 24px;
        }

        .card-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }

        .card-header p {
            margin: 8px 0 0 0;
            color: #d6e7f8;
            font-size: 14px;
        }

        .card-body {
            padding: 24px;
        }

        .record-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .record-form p {
            display: grid;
            gap: 6px;
            margin: 0;
        }

        .record-form p:has(textarea), .record-form .form-actions, .record-form .errorlist {
            grid-column: 1 / -1;
        }

        label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 900;
        }

        input, select, textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 11px;
            background: #fff;
            color: var(--ink);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .helptext {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .errorlist {
            margin: 0;
            padding-left: 18px;
            color: var(--red);
            font-size: 13px;
        }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
            border-top: 1px solid var(--line);
            padding-top: 20px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 10px 16px;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .button.primary {
            background: var(--navy);
            color: #fff;
        }

        .button.primary:hover {
            opacity: 0.9;
        }

        .button.secondary {
            background: #fff;
            color: var(--muted);
            border-color: var(--line);
        }

        .button.secondary:hover {
            background: #f8fafc;
            color: var(--ink);
        }

        @media (max-width: 640px) {
            .page {
                padding: 18px 0;
            }
            .card-body {
                padding: 16px;
            }
            .record-form {
                grid-template-columns: 1fr;
            }
            .form-actions {
                flex-direction: column-reverse;
                align-items: stretch;
            }
            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="card">
            <header class="card-header">
                <h1>Edit {{ label }}</h1>
                <p>Modify the details below to update the dashboard entry.</p>
            </header>
            <div class="card-body">
                <form class="record-form" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="form-actions">
                        <a href="{% url 'dashboard:data_entry' %}" class="button secondary">Cancel</a>
                        <button type="submit" class="button primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
