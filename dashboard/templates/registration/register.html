<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PMC Dashboard</title>
    <style>
        :root {
            --bg: #f3f6fa;
            --surface: #ffffff;
            --ink: #101828;
            --muted: #5f6b7a;
            --line: #d9e1ea;
            --navy: #0b2f5b;
            --red: #c5221f;
            --shadow: 0 18px 45px rgba(16, 24, 40, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background: var(--bg);
            padding: 20px;
        }

        button:focus-visible, a:focus-visible, input:focus-visible {
            outline: 3px solid #84c5ff;
            outline-offset: 2px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .head {
            background: var(--navy);
            color: #fff;
            padding: 22px;
        }

        h1, p { margin: 0; }

        h1 {
            font-size: 26px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .head p {
            color: #d6e7f8;
            margin-top: 8px;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 14px;
            padding: 22px;
        }

        form p {
            display: grid;
            gap: 6px;
            margin: 0;
        }

        label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 900;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 11px 12px;
            font: inherit;
        }

        .helptext {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        ul {
            margin: 0;
            padding-left: 18px;
        }

        .errorlist {
            color: var(--red);
            font-size: 13px;
        }

        .actions {
            display: grid;
            gap: 10px;
            margin-top: 4px;
        }

        button, .link-button {
            border: 0;
            border-radius: 6px;
            background: var(--navy);
            color: #fff;
            padding: 11px 14px;
            font: inherit;
            font-weight: 900;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        .secondary {
            background: #fff;
            color: var(--navy);
            border: 1px solid var(--navy);
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="head">
            <h1>Create Account</h1>
            <p>Register to access the PMC dashboard and maintain project reporting data.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="actions">
                <button type="submit">Register</button>
                <a class="link-button secondary" href="{% url 'login' %}">Back to Login</a>
            </div>
        </form>
    </main>
</body>
</html>
